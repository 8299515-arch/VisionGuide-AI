version: '3.9'

services:
  backend:
    build: ./backend
    container_name: visionguide-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: always
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    container_name: visionguide-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: visionguide
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: visionguide-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
