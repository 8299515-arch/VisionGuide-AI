version: '3.9'

services:
  backend:
    build: ./backend
    container_name: visionguide-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: always
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
